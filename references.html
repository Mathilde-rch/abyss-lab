<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REFERENCES | ABYSS LAB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/couture" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<style>

body { background:#000; color:#fff; }

/* VIDEO */
.video-background {
  position:fixed;
  inset:0;
  z-index:-2;
}
.video-background video {
  width:100%;
  height:100%;
  object-fit:cover;
}
.video-background::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
}

/* STRUCTURE */
main { position:relative; z-index:2; }
.references-page { padding:120px 0 80px; }

/* HERO */
.references-hero {
  text-align:center;
  max-width:760px;
  margin:0 auto 60px;
}
.references-title {
  font-family:'Couture';
  font-size:clamp(54px,8vw,110px);
  text-transform:uppercase;
}
.references-intro { opacity:.75; }

/* GRID */
.references-grid {
  max-width:1180px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:26px;
}

.reference-card {
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  cursor:pointer;
}

.reference-card img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.7s;
}

.reference-card::after {
  content:"";
  position:absolute;
  inset:0;
  opacity:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,.3);
  transition:.5s;
}

.reference-overlay {
  position:absolute;
  inset:0;
  padding:25px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  opacity:0;
  transform:translateY(20px);
  transition:.5s;
}

.reference-card:hover img,
.reference-card.active img {
  transform:scale(1.06);
  filter:brightness(.6);
}

.reference-card:hover::after,
.reference-card.active::after {
  opacity:1;
}

.reference-card:hover .reference-overlay,
.reference-card.active .reference-overlay {
  opacity:1;
  transform:translateY(0);
}

/* TEXT */
.reference-name { font-weight:800; font-size:22px; }
.reference-missions { font-size:10px; text-transform:uppercase; }
.reference-stats span {
  font-size:9px;
  border:1px solid rgba(255,255,255,.3);
  padding:5px 8px;
}

/* CTA */
.references-cta {
  text-align:center;
  padding:90px 0;
}
.cta-btn {
  border:1px solid #fff;
  padding:12px 24px;
  text-decoration:none;
  color:#fff;
  margin:5px;
  display:inline-block;
}

/* MOBILE UX */
@media(max-width:575px){
  .references-grid { grid-template-columns:1fr; }

  .reference-card.in-view img {
    transform:scale(1.03);
    filter:brightness(.75);
  }
  .reference-card.in-view::after { opacity:1; }
  .reference-card.in-view .reference-overlay {
    opacity:1;
    transform:translateY(0);
  }
}

/* CENTER LAST 2 */
@media(min-width:992px){
  .references-grid .reference-card:nth-last-child(2){
    grid-column:2;
  }
  .references-grid .reference-card:last-child{
    grid-column:3;
  }
}

</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-background">
  <video autoplay muted loop playsinline>
    <source src="assets/video/abyss-lab.mp4" type="video/mp4">
  </video>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark py-3">
<div class="container">
<a class="navbar-brand" href="index.html">ABYSS LAB.</a>
</div>
</nav>

<main class="references-page">
<div class="container">

<!-- HERO -->
<div class="references-hero">
<h1 class="references-title">REFERENCES</h1>
<p class="references-intro">Selection de projets accompagnes.</p>
</div>

<!-- GRID -->
<div class="references-grid">

<!-- (cards identiques raccourcies ici) -->
<div class="reference-card"><img src="https://res.cloudinary.com/dycdc9tku/image/upload/v1777896954/mondrian_bordeaux_les_carmes_mathilde_ranchon_cu2zhi.webp"><div class="reference-overlay"><h2 class="reference-name">Mondrian</h2></div></div>

<div class="reference-card"><img src="https://res.cloudinary.com/dycdc9tku/image/upload/v1777896773/marketing_communication_morimoto_bordeaux_cxgmcj.jpg"><div class="reference-overlay"><h2 class="reference-name">Morimoto</h2></div></div>

<div class="reference-card"><img src="https://res.cloudinary.com/dycdc9tku/image/upload/v1777896953/chateau_de_sacy_reims_mathilde_ranchon_ow2xel.webp"><div class="reference-overlay"><h2 class="reference-name">Sacy</h2></div></div>

<div class="reference-card"><img src="https://res.cloudinary.com/dycdc9tku/image/upload/v1777896954/eklo_hotels_mathilde_ranchon_off5rn.webp"><div class="reference-overlay"><h2 class="reference-name">Eklo</h2></div></div>

<div class="reference-card"><img src="https://res.cloudinary.com/dycdc9tku/image/upload/v1777896954/la_course_bordeaux_mathilde_ranchon_lezuzt.webp"><div class="reference-overlay"><h2 class="reference-name">La Course</h2></div></div>

</div>

<!-- CTA -->
<div class="references-cta">
<h2>FROM DEPTH TO DISTINCTION.</h2>
<a href="contact.html" class="cta-btn">Contact</a>
<a href="https://canva.link/z7lu89p62mca8qa" target="_blank" class="cta-btn">Portfolio</a>
</div>

</div>
</main>

<!-- FOOTER -->
<footer>
<div class="container">
<strong>ABYSS LAB.</strong>
</div>
</footer>

<script>
/* CLICK MOBILE */
document.querySelectorAll(".reference-card").forEach(card=>{
  card.addEventListener("click", ()=>{
    card.classList.toggle("active");
  });
});

/* SCROLL MOBILE */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(window.innerWidth <= 575){
      if(entry.intersectionRatio >= .85){
        setTimeout(()=>{
          entry.target.classList.add("in-view");
        },650);
      } else {
        entry.target.classList.remove("in-view");
      }
    }
  });
},{threshold:[0,0.5,0.85,1]});

document.querySelectorAll(".reference-card").forEach(el=>observer.observe(el));
</script>

</body>
</html>
