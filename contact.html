<form
  action="https://formsubmit.co/ajax/mathilde@abyss-lab.com"
  method="POST"
  class="mt-4"
  id="contactForm"
>
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_subject" value="Nouveau contact - Abyss Lab">
  <input type="hidden" name="_template" value="table">
  <input type="text" name="_honey" style="display:none">

  <div class="mb-3">
    <input type="text" class="form-control" name="Nom / Société" placeholder="Nom / Société" required>
  </div>

  <div class="mb-3">
    <input type="email" class="form-control" name="Email" placeholder="Adresse email" required>
  </div>

  <div class="mb-3">
    <input type="text" class="form-control" name="Instagram / Site web" placeholder="Instagram / Site web">
  </div>

  <div class="mb-3">
    <select class="form-select" name="Type de projet" required>
      <option value="" selected disabled>Votre besoin</option>
      <option>Branding</option>
      <option>Direction artistique</option>
      <option>Création de contenu</option>
      <option>Site internet</option>
      <option>Social media</option>
      <option>Stratégie digitale</option>
      <option>Projet global</option>
    </select>
  </div>

  <div class="mb-3">
    <textarea
      class="form-control"
      name="Message"
      rows="6"
      placeholder="Expliquez-nous votre projet, vos objectifs ou votre vision..."
      required
    ></textarea>
  </div>

  <div class="form-check consent-check">
    <input
      class="form-check-input"
      type="checkbox"
      id="rgpdConsent"
      name="Consentement RGPD"
      value="Oui"
      required
    >

    <label class="form-check-label" for="rgpdConsent">
      J'accepte que mes coordonnées ci-dessus soient enregistrées par
      <strong>Abyss Lab</strong> dans le but de traiter ma demande.
    </label>
  </div>

  <button type="submit" class="btn-abyss">
    ENVOYER LA DEMANDE
  </button>

  <p id="formMessage" class="form-message"></p>
</form>
